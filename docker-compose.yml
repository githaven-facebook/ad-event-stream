version: "3.8"

networks:
  ad-event-net:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  minio-data:
  flink-checkpoints:

services:

  # ──────────────────────────────────────────────
  # Zookeeper (required by Kafka)
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    hostname: zookeeper
    container_name: ad-event-zookeeper
    networks:
      - ad-event-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Kafka
  # ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka
    container_name: ad-event-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - ad-event-net
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible local storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    hostname: minio
    container_name: ad-event-minio
    networks:
      - ad-event-net
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Flink JobManager
  # ──────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    hostname: flink-jobmanager
    container_name: ad-event-flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ad-event-net
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        parallelism.default: 2
        web.submit.enable: true
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # Flink TaskManager
  # ──────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    hostname: flink-taskmanager
    container_name: ad-event-flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - ad-event-net
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
    scale: 1

  # ──────────────────────────────────────────────
  # Schema Registry (optional, for Avro schema management)
  # ──────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    hostname: schema-registry
    container_name: ad-event-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ad-event-net
    ports:
      - "8082:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    profiles:
      - full
