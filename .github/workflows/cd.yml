name: CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options: [ "staging", "production" ]
      job_type:
        description: "Job type to deploy"
        required: true
        default: "all"
        type: choice
        options: [ "all", "ssp", "dsp" ]

env:
  REGISTRY: registry.fb.internal
  IMAGE_NAME: ads/ad-event-stream

jobs:
  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}

      - name: Build fat JARs
        run: ./gradlew :ssp-stream:shadowJar :dsp-stream:shadowJar --parallel

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-staging:
    name: Deploy to Staging
    needs: build-image
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Helm upgrade SSP stream
        if: github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'ssp' || github.event.inputs.job_type == ''
        run: |
          helm upgrade --install ad-event-stream-ssp ./helm/ad-event-stream \
            --namespace ad-platform \
            --create-namespace \
            --set image.tag=${{ needs.build-image.outputs.image-tag }} \
            --set ssp.enabled=true \
            --set dsp.enabled=false \
            --set kafka.bootstrapServers=${{ secrets.STAGING_KAFKA_BROKERS }} \
            --set s3.outputBucket=${{ secrets.STAGING_S3_BUCKET }} \
            --set flink.checkpointing.storagePath=${{ secrets.STAGING_CHECKPOINT_PATH }} \
            --wait --timeout=5m

      - name: Helm upgrade DSP stream
        if: github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'dsp' || github.event.inputs.job_type == ''
        run: |
          helm upgrade --install ad-event-stream-dsp ./helm/ad-event-stream \
            --namespace ad-platform \
            --create-namespace \
            --set image.tag=${{ needs.build-image.outputs.image-tag }} \
            --set ssp.enabled=false \
            --set dsp.enabled=true \
            --set kafka.bootstrapServers=${{ secrets.STAGING_KAFKA_BROKERS }} \
            --set s3.outputBucket=${{ secrets.STAGING_S3_BUCKET }} \
            --set flink.checkpointing.storagePath=${{ secrets.STAGING_CHECKPOINT_PATH }} \
            --wait --timeout=5m

  deploy-production:
    name: Deploy to Production
    needs: [ build-image, deploy-staging ]
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Helm upgrade SSP stream (production)
        if: github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'ssp' || github.event.inputs.job_type == ''
        run: |
          helm upgrade --install ad-event-stream-ssp ./helm/ad-event-stream \
            --namespace ad-platform \
            --create-namespace \
            --set image.tag=${{ needs.build-image.outputs.image-tag }} \
            --set ssp.enabled=true \
            --set dsp.enabled=false \
            --set kafka.bootstrapServers=${{ secrets.PROD_KAFKA_BROKERS }} \
            --set s3.outputBucket=${{ secrets.PROD_S3_BUCKET }} \
            --set flink.checkpointing.storagePath=${{ secrets.PROD_CHECKPOINT_PATH }} \
            --set flink.taskmanager.replicas=4 \
            --set flink.parallelism.default=8 \
            --wait --timeout=10m

      - name: Helm upgrade DSP stream (production)
        if: github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'dsp' || github.event.inputs.job_type == ''
        run: |
          helm upgrade --install ad-event-stream-dsp ./helm/ad-event-stream \
            --namespace ad-platform \
            --create-namespace \
            --set image.tag=${{ needs.build-image.outputs.image-tag }} \
            --set ssp.enabled=false \
            --set dsp.enabled=true \
            --set kafka.bootstrapServers=${{ secrets.PROD_KAFKA_BROKERS }} \
            --set s3.outputBucket=${{ secrets.PROD_S3_BUCKET }} \
            --set flink.checkpointing.storagePath=${{ secrets.PROD_CHECKPOINT_PATH }} \
            --set flink.taskmanager.replicas=4 \
            --set flink.parallelism.default=8 \
            --wait --timeout=10m
